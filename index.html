const todayStr=()=>new Date().toISOString().split('T')[0];
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function daysTo(s,t){if(!s)return null;return Math.ceil((new Date(s)-t)/86400000);}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}`;}
function fmtFull(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}

function calcScore(c,t){
  let s=0;
  if(c.brunoStatus==='critico')s+=8;else if(c.brunoStatus==='atencao')s+=4;else if(c.brunoStatus==='sem_dados')s+=2;
  if(c.eventoDate){const d=daysTo(c.eventoDate,t);if(d!=null&&d>=0){if(d<=10)s+=15;else if(d<=20)s+=8;else if(d<=30)s+=5;else if(d<=60)s+=2;else s+=1;}}
  if(!c.davi&&c.contratoVenc){const v=daysTo(c.contratoVenc,t);if(v!=null){if(v<=0)s+=6;else if(v<=30)s+=3;}}
  if(c.alerta==='reclamacao')s+=20;else if(c.alerta==='davi')s+=15;
  if(c.reuniaoStatus==='realizado')s-=100;else if(c.reuniaoStatus==='agendado')s-=10;
  return s+c.id*0.001;
}
function getMotivo(c,t){
  const p=[];
  if(c.brunoStatus==='critico')p.push('Performance crítica');
  else if(c.brunoStatus==='atencao')p.push('Atenção');
  if(c.eventoDate){const d=daysTo(c.eventoDate,t);if(d!=null&&d>=0&&d<=30)p.push(`Evento ${d}d${d<=10?' ⚠':''}`)}
  if(!c.davi&&c.contratoVenc){const v=daysTo(c.contratoVenc,t);if(v!=null){if(v<=0)p.push('Contrato vencido');else if(v<=30)p.push(`Vence ${v}d`);}}
  if(c.alerta==='reclamacao')p.push('Reclamação');
  return p.join(' · ')||'Monitorar';
}
function renovSt(c,t){
  if(c.davi)return'davi';if(!c.contratoVenc)return'none';
  const d=daysTo(c.contratoVenc,t);if(d<=0)return'vencido';if(d<=30)return'avencer';return'vigente';
}

async function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
async function askClaude(b64,mtype,prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,
      messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:mtype,data:b64}},{type:'text',text:prompt}]}]})});
  const data=await resp.json();
  return data.content?.map(b=>b.text||'').join('')||'';
}

// Constelação Lyra: símbolo minimalista SaaS — pontos conectados por linhas finas
function LyraConstellation({size=52}){
  // Coordenadas da constelação Lyra simplificada
  // Vega (estrela principal) no topo + paralelogramo de 4 estrelas abaixo
  const C = "#E64B97";
  const nodes = [
    {x:34, y:8},   // 0 — Vega (topo, sparkle)
    {x:44, y:22},  // 1 — direita alta
    {x:40, y:38},  // 2 — direita baixa
    {x:22, y:38},  // 3 — esquerda baixa
    {x:18, y:22},  // 4 — esquerda alta
  ];
  const edges = [[0,1],[0,4],[1,2],[4,3],[1,3],[4,2]]; // conexões
  const sc = size/58;
  return(
    <svg width={size} height={size} viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      {/* linhas da constelação */}
      {edges.map(([a,b],i)=>(
        <line key={i}
          x1={nodes[a].x} y1={nodes[a].y}
          x2={nodes[b].x} y2={nodes[b].y}
          stroke={C} strokeWidth="1.2" strokeOpacity="0.7"
          strokeLinecap="round"
        />
      ))}
      {/* nós — estrelas comuns */}
      {nodes.slice(1).map((n,i)=>(
        <circle key={i} cx={n.x} cy={n.y} r="2.8" fill={C} opacity="0.85"/>
      ))}
      {/* Vega — estrela principal (sparkle de 4 pontas) */}
      <path
        d="M34 2 C34 2 32.8 7.2 31 9 C29.2 10.8 24 12 24 12 C24 12 29.2 13.2 31 15 C32.8 16.8 34 22 34 22 C34 22 35.2 16.8 37 15 C38.8 13.2 44 12 44 12 C44 12 38.8 10.8 37 9 C35.2 7.2 34 2 34 2Z"
        fill={C}
      />
      {/* ponto brilho secundário pequeno */}
      <path
        d="M46 4 C46 4 45.4 6.2 44.5 7 C43.6 7.8 41.5 8.3 41.5 8.3 C41.5 8.3 43.6 8.8 44.5 9.6 C45.4 10.4 46 12.6 46 12.6 C46 12.6 46.6 10.4 47.5 9.6 C48.4 8.8 50.5 8.3 50.5 8.3 C50.5 8.3 48.4 7.8 47.5 7 C46.6 6.2 46 4 46 4Z"
        fill={C} opacity="0.6"
      />
    </svg>
  );
}

// ─── BADGES ────────────────────────────────────────────────────────────────────
function Bdg({type,label,size=11}){
  const colors={
    critico:{bg:'#FEE2E2',c:'#DC2626'},
    atencao:{bg:'#FEF3C7',c:'#B45309'},
    saudavel:{bg:'#DCFCE7',c:'#15803D'},
    sem_dados:{bg:'#F3F4F6',c:'#6B7280'},
    agendar:{bg:'#FEE2E2',c:'#DC2626'},
    agendado:{bg:'#FEF3C7',c:'#B45309'},
    realizado:{bg:'#DCFCE7',c:'#15803D'},
    vencido:{bg:'#FEE2E2',c:'#DC2626'},
    avencer:{bg:'#FEF3C7',c:'#B45309'},
    vigente:{bg:'#DCFCE7',c:'#15803D'},
    davi:{bg:'#F3E8FF',c:'#7E22CE'},
    none:{bg:'#F3F4F6',c:'#6B7280'},
    pink:{bg:P_LIGHT,c:P_DARK},
  };
  const s=colors[type]||colors.none;
  return<span style={{background:s.bg,color:s.c,padding:'2px 8px',borderRadius:20,fontSize:size,fontWeight:600,whiteSpace:'nowrap'}}>{label}</span>;
}
function BrunoBdg({status}){const m={critico:'Crítico',atencao:'Atenção',saudavel:'Saudável',sem_dados:'Sem dados'};return<Bdg type={status} label={m[status]||'—'}/>;}
function ReuniaBdg({status}){const m={agendar:'Agendar',agendado:'Agendado',realizado:'Realizado'};return<Bdg type={status} label={m[status]||'—'}/>;}
function RenovBdg({status}){
  if(status==='davi')return<Bdg type="davi" label="Davi"/>;
  if(status==='vencido')return<Bdg type="vencido" label="Vencido"/>;
  if(status==='avencer')return<Bdg type="avencer" label="À vencer"/>;
  if(status==='vigente')return<Bdg type="vigente" label="Vigente"/>;
  return<span style={{color:'#9CA3AF',fontSize:11}}>—</span>;
}

// ─── LYRA HOME ─────────────────────────────────────────────────────────────────
function LyraHome({clients,onSelect,onUpd,hoje,onToggleHoje,today}){
  const META=5;
  const[kpiModal,setKpiModal]=useState(null);
  const active=clients.filter(c=>c.status==='ativo');
  const scored=active.map(c=>({...c,sc:calcScore(c,today)})).sort((a,b)=>b.sc-a.sc);
  const queue=scored.filter(c=>c.sc>-50);
  const agendados=scored.filter(c=>c.reuniaoStatus==='agendado');
  const hojeList=clients.filter(c=>hoje.includes(c.id));
  const done=hojeList.filter(c=>c.reuniaoStatus==='realizado').length;
  const nC=active.filter(c=>c.brunoStatus==='critico');
  const nA=active.filter(c=>c.brunoStatus==='atencao');
  const nAg=active.filter(c=>c.reuniaoStatus==='agendar');
  const nV=active.filter(c=>!c.davi&&c.contratoVenc&&daysTo(c.contratoVenc,today)<=30);
  const hr=new Date().getHours();
  const greeting=hr<12?'Bom dia':hr<18?'Boa tarde':'Boa noite';
  const dateStr=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  const rCol=(i)=>i<3?'#DC2626':i<6?'#B45309':'#2563EB';

  const kpis=[
    {l:'Críticos',v:nC.length,list:nC,bg:`linear-gradient(135deg,#FF6B8A,${P})`,icon:'ti-alert-circle',key:'critico'},
    {l:'Atenção',v:nA.length,list:nA,bg:'linear-gradient(135deg,#FFB347,#FF6B8A)',icon:'ti-eye',key:'atencao'},
    {l:'Agendar',v:nAg.length,list:nAg,bg:`linear-gradient(135deg,${P},${P_DARK})`,icon:'ti-phone',key:'agendar'},
    {l:'Contratos',v:nV.length,list:nV,bg:`linear-gradient(135deg,${LAVANDA},${P})`,icon:'ti-file-text',key:'contratos'},
  ];

  return<div style={{flex:1,overflowY:'auto',padding:'28px 32px',background:P_BG}}>
    {kpiModal&&<KpiModal title={kpiModal.title} clients={kpiModal.list} onSelect={onSelect} onClose={()=>setKpiModal(null)}/>}

    <div style={{marginBottom:28}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:800,color:GRAFITE,marginBottom:4}}>{greeting}, Vanessa! ✦</div>
      <div style={{fontSize:13,color:'#B08090',textTransform:'capitalize'}}>{dateStr}</div>
    </div>

    {/* KPIs */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:26}}>
      {kpis.map(k=><div key={k.l}
        onClick={()=>setKpiModal({title:k.l,list:k.list})}
        style={{background:k.bg,borderRadius:18,padding:'20px 18px',color:'white',boxShadow:'0 4px 20px rgba(230,75,151,0.2)',cursor:'pointer',transition:'transform 0.15s,box-shadow 0.15s'}}
        onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 28px rgba(230,75,151,0.3)';}}
        onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 20px rgba(230,75,151,0.2)';}}>
        <i className={`ti ${k.icon}`} style={{fontSize:22,opacity:0.85,display:'block',marginBottom:10}}/>
        <div style={{fontSize:38,fontWeight:800,lineHeight:1}}>{k.v}</div>
        <div style={{fontSize:11,opacity:0.9,marginTop:5,fontWeight:600}}>{k.l}</div>
        <div style={{fontSize:9,opacity:0.65,marginTop:2}}>clique para ver</div>
      </div>)}
    </div>

    {/* Meta do dia */}
    <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,padding:'18px 22px',marginBottom:18,boxShadow:'0 2px 12px rgba(230,75,151,0.07)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,color:GRAFITE}}>
          <i className="ti ti-target" style={{color:P,marginRight:8,fontSize:16}}/>Meta do dia — {META} reuniões
        </div>
        <div style={{fontSize:12,color:'#B08090',fontWeight:600}}>{done}/{META} realizadas · {hoje.length}/{META} selecionadas</div>
      </div>
      <div style={{background:P_LIGHT,borderRadius:20,height:8,overflow:'hidden',marginBottom:14}}>
        <div style={{background:`linear-gradient(90deg,${P},${P_DARK})`,height:'100%',width:`${Math.min(100,(done/META)*100)}%`,transition:'width 0.4s',borderRadius:20}}/>
      </div>
      {hojeList.length>0
        ?<div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {hojeList.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:6,background:P_LIGHT,border:`1px solid ${P_BORDER}`,borderRadius:20,padding:'4px 12px 4px 8px',fontSize:12}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:c.reuniaoStatus==='realizado'?'#16a34a':c.reuniaoStatus==='agendado'?'#B45309':P,flexShrink:0}}/>
            <span onClick={()=>onSelect(c.id)} style={{cursor:'pointer',fontWeight:600,color:GRAFITE}}>{c.name}</span>
            <button onClick={()=>onToggleHoje(c.id)} style={{background:'none',color:'#C06090',fontSize:16,lineHeight:1,padding:0,border:'none',cursor:'pointer'}}>×</button>
          </div>)}
        </div>
        :<div style={{fontSize:12,color:'#C06090',textAlign:'center',padding:'4px 0'}}>Clique em "+ hoje" na fila abaixo para selecionar seus 5 clientes do dia</div>
      }
    </div>

    {/* Agendados */}
    {agendados.length>0&&<div style={{background:'white',border:'1px solid #FCD34D',borderRadius:18,overflow:'hidden',marginBottom:18}}>
      <div style={{padding:'12px 20px',borderBottom:'1px solid #FEF3C7',background:'#FFFBEB',display:'flex',justifyContent:'space-between'}}>
        <span style={{fontSize:13,fontWeight:700,color:'#B45309'}}><i className="ti ti-clock" style={{marginRight:6}}/>Reuniões agendadas</span>
        <span style={{fontSize:11,background:'#FEF3C7',color:'#B45309',padding:'2px 8px',borderRadius:20,fontWeight:700}}>{agendados.length}</span>
      </div>
      {agendados.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 20px',borderBottom:'1px solid #FEF3C7',cursor:'pointer'}}
        onClick={()=>onSelect(c.id)}
        onMouseEnter={e=>e.currentTarget.style.background='#FFFBEB'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{flex:1}}><span style={{fontSize:13,fontWeight:600}}>{c.name}</span><span style={{fontSize:11,color:'#B08090',marginLeft:8}}>{c.gestor}</span></div>
        <span style={{fontSize:11,color:'#B45309'}}>{c.reuniaoData?fmtFull(c.reuniaoData):''}</span>
        <button onClick={e=>{e.stopPropagation();onUpd(c.id,{reuniaoStatus:'realizado',reuniaoData:todayStr()});}}
          style={{background:'#DCFCE7',color:'#15803D',border:'none',padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer'}}>✓ Realizado</button>
      </div>)}
    </div>}

    {/* Fila de prioridades */}
    <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,overflow:'hidden',boxShadow:'0 2px 12px rgba(230,75,151,0.06)'}}>
      <div style={{padding:'14px 22px',borderBottom:`1px solid ${P_BORDER}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:15,fontWeight:700,color:GRAFITE}}><i className="ti ti-list-numbers" style={{color:P,marginRight:8}}/>Fila de prioridades</span>
        <span style={{fontSize:11,background:P_LIGHT,color:P_DARK,padding:'3px 10px',borderRadius:20,fontWeight:700}}>{queue.length} clientes</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'32px 185px 1fr 90px 90px 90px 100px',padding:'8px 22px',background:P_BG,borderBottom:`1px solid ${P_BORDER}`}}>
        {['#','Cliente','Por que está aqui','Status','Evento','Contrato','Reunião'].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:'#C06090',letterSpacing:0.5}}>{h}</div>)}
      </div>
      {queue.length===0&&<div style={{padding:40,textAlign:'center',color:'#C06090'}}><i className="ti ti-confetti" style={{fontSize:32,display:'block',marginBottom:8}}/>Tudo em dia!</div>}
      {queue.map((c,i)=>{
        const ev=c.eventoDate?daysTo(c.eventoDate,today):null;
        const isH=hoje.includes(c.id);
        return<div key={c.id}
          style={{display:'grid',gridTemplateColumns:'32px 185px 1fr 90px 90px 90px 100px',padding:'11px 22px',borderBottom:`1px solid #FCE4EC`,cursor:'pointer',transition:'background 0.1s',borderLeft:`3px solid ${isH?P:'transparent'}`}}
          onClick={()=>onSelect(c.id)}
          onMouseEnter={e=>e.currentTarget.style.background=P_BG}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <div style={{fontSize:12,fontWeight:800,color:rCol(i),alignSelf:'center'}}>#{i+1}</div>
          <div style={{alignSelf:'center'}}>
            <div style={{fontSize:13,fontWeight:600,color:GRAFITE}}>{c.name}</div>
            <div style={{marginTop:4}}>
              {isH
                ?<span style={{fontSize:10,background:P_LIGHT,color:P_DARK,padding:'2px 8px',borderRadius:20,fontWeight:700}}>✓ hoje</span>
                :hoje.length<META&&<button onClick={e=>{e.stopPropagation();onToggleHoje(c.id);}}
                  style={{fontSize:10,background:P_LIGHT,color:P,border:`1px solid ${P_BORDER}`,padding:'2px 8px',borderRadius:20,cursor:'pointer',fontWeight:600}}>+ hoje</button>
              }
            </div>
          </div>
          <div style={{alignSelf:'center',fontSize:11,color:'#B08090',paddingRight:8}}>{getMotivo(c,today)}</div>
          <div style={{alignSelf:'center'}}><BrunoBdg status={c.brunoStatus}/></div>
          <div style={{alignSelf:'center',fontSize:11,color:ev!=null&&ev<=10?'#DC2626':'#6B7280',fontWeight:ev!=null&&ev<=10?700:400}}>
            {ev!=null?`${fmtDate(c.eventoDate)} (${ev}d)`:'—'}
          </div>
          <div style={{alignSelf:'center'}}><RenovBdg status={renovSt(c,today)}/></div>
          <div style={{alignSelf:'center'}}><ReuniaBdg status={c.reuniaoStatus}/></div>
        </div>;
      })}
    </div>
  </div>;
}

// ─── AGENDAMENTOS ──────────────────────────────────────────────────────────────
function AgendamentosView({clients,onSelect,today}){
  const[curDate,setCurDate]=useState(new Date());
  const[selectedDay,setSelectedDay]=useState(null);
  const year=curDate.getFullYear();
  const month=curDate.getMonth();
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  const events=useMemo(()=>{
    const ev={};
    clients.filter(c=>c.status==='ativo').forEach(c=>{
      const add=(dateStr,type,color)=>{
        if(!dateStr)return;
        const d=new Date(dateStr);
        if(d.getFullYear()===year&&d.getMonth()===month){
          const key=d.getDate();
          if(!ev[key])ev[key]=[];
          ev[key].push({type,name:c.name,color,id:c.id});
        }
      };
      if(c.reuniaoStatus==='agendado')add(c.reuniaoData,'reuniao','#B45309');
      add(c.eventoDate,'evento',P);
      if(!c.davi)add(c.contratoVenc,'contrato',LAVANDA);
    });
    return ev;
  },[clients,year,month]);

  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const todayDay=new Date().getDate();
  const isCurrentMonth=new Date().getFullYear()===year&&new Date().getMonth()===month;

  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const listToShow=useMemo(()=>{
    if(selectedDay){
      const evs=events[selectedDay]||[];
      return evs.map(ev=>({...ev,day:selectedDay}));
    }
    const all=[];
    Object.entries(events).forEach(([day,evs])=>{evs.forEach(ev=>all.push({...ev,day:parseInt(day)}));});
    return all.sort((a,b)=>a.day-b.day);
  },[events,selectedDay]);

  return<div style={{flex:1,overflowY:'auto',padding:'28px 32px',background:P_BG}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:GRAFITE,marginBottom:4}}>
      <i className="ti ti-calendar-month" style={{color:P,marginRight:10,fontSize:20}}/>Agendamentos
    </div>
    <div style={{fontSize:12,color:'#B08090',marginBottom:24}}>Clique em um dia para ver os eventos · visão mensal</div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:20}}>
      <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,overflow:'hidden'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',background:`linear-gradient(135deg,${P},${P_DARK})`,color:'white'}}>
          <button onClick={()=>{setCurDate(new Date(year,month-1,1));setSelectedDay(null);}} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',width:32,height:32,borderRadius:'50%',cursor:'pointer',fontSize:16}}>‹</button>
          <span style={{fontSize:16,fontWeight:700}}>{monthNames[month]} {year}</span>
          <button onClick={()=>{setCurDate(new Date(year,month+1,1));setSelectedDay(null);}} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',width:32,height:32,borderRadius:'50%',cursor:'pointer',fontSize:16}}>›</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'12px 8px 4px'}}>
          {dayNames.map(d=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:'#C06090',padding:'4px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'4px 8px 16px',gap:2}}>
          {cells.map((day,i)=>{
            if(!day)return<div key={`e${i}`}/>;
            const dayEvs=events[day]||[];
            const isToday=isCurrentMonth&&day===todayDay;
            const isSel=selectedDay===day;
            return<div key={day}
              style={{padding:'6px 4px',borderRadius:8,background:isSel?P:isToday?P_LIGHT:'transparent',border:isSel?`2px solid ${P}`:isToday?`2px solid ${P_BORDER}`:'2px solid transparent',cursor:dayEvs.length?'pointer':'default',minHeight:52,transition:'background 0.1s'}}
              onClick={()=>dayEvs.length&&setSelectedDay(isSel?null:day)}
              onMouseEnter={e=>{if(dayEvs.length&&!isSel)e.currentTarget.style.background=P_LIGHT;}}
              onMouseLeave={e=>{if(!isSel&&!isToday)e.currentTarget.style.background='transparent';else if(isToday&&!isSel)e.currentTarget.style.background=P_LIGHT;}}>
              <div style={{fontSize:12,fontWeight:isToday||isSel?800:500,color:isSel?'white':isToday?P:GRAFITE,textAlign:'center',marginBottom:3}}>{day}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:2,justifyContent:'center'}}>
                {dayEvs.slice(0,3).map((ev,ei)=><span key={ei} style={{width:6,height:6,borderRadius:'50%',background:isSel?'white':ev.color,display:'inline-block'}}/>)}
                {dayEvs.length>3&&<span style={{fontSize:8,color:isSel?'white':'#B08090',fontWeight:700}}>+{dayEvs.length-3}</span>}
              </div>
            </div>;
          })}
        </div>
      </div>

      <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,overflow:'hidden'}}>
        <div style={{padding:'14px 16px',borderBottom:`1px solid ${P_BORDER}`,background:P_BG}}>
          <div style={{fontSize:13,fontWeight:700,color:GRAFITE}}>
            {selectedDay?`Dia ${selectedDay} — ${listToShow.length} evento(s)`:'Eventos do mês'}
          </div>
          {selectedDay&&<button onClick={()=>setSelectedDay(null)} style={{fontSize:11,color:P,background:'none',border:'none',cursor:'pointer',marginTop:4,fontWeight:600}}>← Ver todos do mês</button>}
          {!selectedDay&&<div style={{display:'flex',gap:10,marginTop:8,flexWrap:'wrap'}}>
            {[{c:P,l:'Evento'},{c:'#B45309',l:'Reunião'},{c:LAVANDA,l:'Contrato'}].map(({c,l})=><span key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#6B7280'}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:c}}/>{l}
            </span>)}
          </div>}
        </div>
        <div style={{overflowY:'auto',maxHeight:400}}>
          {listToShow.length===0&&<div style={{padding:24,textAlign:'center',color:'#C06090',fontSize:12}}>
            <i className="ti ti-calendar-off" style={{fontSize:24,display:'block',marginBottom:6}}/>Nenhum evento
          </div>}
          {listToShow.map((ev,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',borderBottom:`1px solid #FCE4EC`,cursor:'pointer'}}
            onClick={()=>ev.id&&onSelect(ev.id)}
            onMouseEnter={e=>e.currentTarget.style.background=P_BG}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{width:32,height:32,borderRadius:8,background:ev.color+'20',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{fontSize:13,fontWeight:800,color:ev.color}}>{ev.day}</span>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:GRAFITE}}>{ev.name}</div>
              <div style={{fontSize:10,color:ev.color,fontWeight:600,marginTop:1}}>{ev.type==='evento'?'Evento':ev.type==='reuniao'?'Reunião agendada':'Vencimento contrato'}</div>
            </div>
          </div>)}
        </div>
      </div>
    </div>
  </div>;
}

// ─── RENOVAÇÕES ──────────────────────────────────────────────────────────────
function RenovacoesView({clients,onSelect,today}){
  const active=clients.filter(c=>c.status==='ativo');
  const vencidos=active.filter(c=>!c.davi&&c.contratoVenc&&daysTo(c.contratoVenc,today)<0).sort((a,b)=>daysTo(a.contratoVenc,today)-daysTo(b.contratoVenc,today));
  const avencer=active.filter(c=>!c.davi&&c.contratoVenc&&daysTo(c.contratoVenc,today)>=0&&daysTo(c.contratoVenc,today)<=60).sort((a,b)=>daysTo(a.contratoVenc,today)-daysTo(b.contratoVenc,today));
  const daviC=active.filter(c=>c.davi);

  const Section=({title,items,color,icon})=>items.length>0&&<div style={{background:'white',border:`1px solid ${color}30`,borderRadius:18,overflow:'hidden',marginBottom:14}}>
    <div style={{padding:'12px 20px',borderBottom:`1px solid ${color}15`,background:`${color}08`}}>
      <span style={{fontSize:13,fontWeight:700,color}}><i className={`ti ${icon}`} style={{marginRight:8}}/>{title} ({items.length})</span>
    </div>
    {items.map(c=>{const d=c.contratoVenc?daysTo(c.contratoVenc,today):null;
      return<div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 20px',borderBottom:'1px solid #FCE4EC',cursor:'pointer'}}
        onClick={()=>onSelect(c.id)}
        onMouseEnter={e=>e.currentTarget.style.background=P_BG}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div><div style={{fontSize:13,fontWeight:600,color:GRAFITE}}>{c.name}</div><div style={{fontSize:11,color:'#B08090',marginTop:2}}>{c.gestor} · {c.contratoVal}</div></div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          {d!=null&&<span style={{fontSize:12,color:d<0?'#DC2626':d<=30?'#B45309':'#6B7280'}}>{d<0?`Venceu há ${Math.abs(d)}d`:`Vence em ${d}d`} · {fmtFull(c.contratoVenc)}</span>}
          <RenovBdg status={renovSt(c,today)}/>
        </div>
      </div>;
    })}
  </div>;

  return<div style={{flex:1,overflowY:'auto',padding:'28px 32px',background:P_BG}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:GRAFITE,marginBottom:4}}><i className="ti ti-file-text" style={{color:P,marginRight:10}}/>Renovações</div>
    <p style={{fontSize:12,color:'#B08090',marginBottom:20}}>Contratos que precisam de atenção — clique para editar</p>
    <Section title="Contratos vencidos" items={vencidos} color="#DC2626" icon="ti-alert-circle"/>
    <Section title="Vencendo em 60 dias" items={avencer} color="#B45309" icon="ti-clock"/>
    <Section title="Contratos com Davi" items={daviC} color={LAVANDA} icon="ti-user"/>
    {!vencidos.length&&!avencer.length&&!daviC.length&&<div style={{textAlign:'center',padding:48,color:'#C06090'}}>
      <i className="ti ti-circle-check" style={{fontSize:36,display:'block',marginBottom:10}}/><div style={{fontSize:14,fontWeight:600}}>Nenhum contrato urgente!</div>
    </div>}
  </div>;
}

// ─── CLIENTES ─────────────────────────────────────────────────────────────────
function ClientesView({clients,onSelect,today}){
  const[tab,setTab]=useState('ativo');
  const[search,setSearch]=useState('');
  const[gestor,setGestor]=useState('');
  const gestores=[...new Set(clients.filter(c=>c.status==='ativo'&&c.gestor!=='—').map(c=>c.gestor))].sort();
  const list=clients.filter(c=>c.status===tab&&(!search||c.name.toLowerCase().includes(search.toLowerCase()))&&(!gestor||c.gestor===gestor));

  return<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:P_BG}}>
    <div style={{padding:'24px 32px 0',flexShrink:0}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:GRAFITE,marginBottom:16}}><i className="ti ti-users" style={{color:P,marginRight:10}}/>Clientes</div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        {['ativo','pausado'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'7px 18px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',border:`1px solid ${tab===t?P:P_BORDER}`,background:tab===t?P:'white',color:tab===t?'white':P_DARK}}>
          {t==='ativo'?`Ativos (${clients.filter(c=>c.status==='ativo').length})`:`Pausados (${clients.filter(c=>c.status==='pausado').length})`}
        </button>)}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar cliente..." style={{flex:1,minWidth:150,padding:'7px 14px',borderRadius:20,fontSize:12,border:`1px solid ${P_BORDER}`,background:'white',color:GRAFITE}}/>
        {tab==='ativo'&&<select value={gestor} onChange={e=>setGestor(e.target.value)} style={{padding:'7px 14px',borderRadius:20,fontSize:12,border:`1px solid ${P_BORDER}`,background:'white',color:GRAFITE,cursor:'pointer'}}>
          <option value="">Todos os gestores</option>{gestores.map(g=><option key={g} value={g}>{g}</option>)}
        </select>}
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'0 32px 24px'}}>
      <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 90px 120px 90px 90px 90px 100px',padding:'10px 20px',background:P_BG,borderBottom:`1px solid ${P_BORDER}`}}>
          {['Cliente','Gestor','Tipo','Status','Evento','Contrato','Reunião'].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:'#C06090',letterSpacing:0.5}}>{h}</div>)}
        </div>
        {list.length===0&&<div style={{padding:32,textAlign:'center',color:'#C06090',fontSize:13}}>Nenhum cliente encontrado</div>}
        {list.map(c=>{
          const ev=c.eventoDate?daysTo(c.eventoDate,today):null;
          return<div key={c.id}
            style={{display:'grid',gridTemplateColumns:'1fr 90px 120px 90px 90px 90px 100px',padding:'11px 20px',borderBottom:'1px solid #FCE4EC',cursor:'pointer',transition:'background 0.1s'}}
            onClick={()=>onSelect(c.id)}
            onMouseEnter={e=>e.currentTarget.style.background=P_BG}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:GRAFITE}}>{c.name}</div>
              {c.contato!=='—'&&<div style={{fontSize:10,color:'#B08090',marginTop:1}}>{c.contato}</div>}
              {c.obs&&<div style={{fontSize:10,color:'#C06090',marginTop:1,fontStyle:'italic'}}>{c.obs.substring(0,45)}{c.obs.length>45?'…':''}</div>}
            </div>
            <div style={{alignSelf:'center',fontSize:12,color:'#6B7280'}}>{c.gestor}</div>
            <div style={{alignSelf:'center',fontSize:11,color:'#6B7280'}}>{c.tipo.substring(0,18)}{c.tipo.length>18?'…':''}</div>
            <div style={{alignSelf:'center'}}>{c.status==='ativo'?<BrunoBdg status={c.brunoStatus}/>:<Bdg type="none" label="Pausado"/>}</div>
            <div style={{alignSelf:'center',fontSize:11,color:ev!=null&&ev<=10?'#DC2626':'#6B7280',fontWeight:ev!=null&&ev<=10?700:400}}>{ev!=null?`${fmtDate(c.eventoDate)} (${ev}d)`:'—'}</div>
            <div style={{alignSelf:'center'}}><RenovBdg status={renovSt(c,today)}/></div>
            <div style={{alignSelf:'center'}}><ReuniaBdg status={c.reuniaoStatus}/></div>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

// ─── RELATÓRIO ────────────────────────────────────────────────────────────────
function RelatorioView({clients,onUpdate,brunoDate,onSetDate}){
  const[date,setDate]=useState(brunoDate||'');
  const[file,setFile]=useState(null);
  const[loading,setLoading]=useState(false);
  const[preview,setPreview]=useState(null);
  const[error,setError]=useState('');
  const[msg,setMsg]=useState('');
  const active=clients.filter(c=>c.status==='ativo').sort((a,b)=>['critico','atencao','sem_dados','saudavel'].indexOf(a.brunoStatus)-['critico','atencao','sem_dados','saudavel'].indexOf(b.brunoStatus));
  const si={border:`1px solid ${P_BORDER}`,borderRadius:8,padding:'6px 10px',fontSize:12,background:'white',color:GRAFITE,width:'100%'};

  async function analyze(){
    if(!file){setError('Selecione o PDF');return;}
    setLoading(true);setError('');setPreview(null);
    try{
      const b64=await fileToB64(file);
      const nomes=active.map(c=>c.name).join(', ');
      const text=await askClaude(b64,'application/pdf',`Relatório de performance Jurassic Marketing. Clientes: ${nomes}\nRetorne APENAS JSON:\n{"clientes":[{"nome":"...","status":"critico|atencao|saudavel|sem_dados","roas":0.0,"gasto":0.0}]}\nRegras: critico=ROAS<1.0, atencao=1.0-2.0, saudavel>2.0, sem_dados=sem dados.`);
      const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      setPreview(parsed.clientes||[]);
    }catch(e){setError('Erro ao analisar. Tente novamente.');}
    setLoading(false);
  }

  function apply(){
    let n=0;
    preview.forEach(item=>{
      const c=active.find(a=>a.name.toLowerCase().includes(item.nome.toLowerCase())||item.nome.toLowerCase().includes(a.name.toLowerCase()));
      if(c){onUpdate(c.id,{brunoStatus:item.status,brunoRoas:item.roas,brunoGasto:item.gasto||c.brunoGasto});n++;}
    });
    if(date)onSetDate(date);
    setMsg(`${n} clientes atualizados!`);setPreview(null);setFile(null);setTimeout(()=>setMsg(''),4000);
  }

  return<div style={{flex:1,overflowY:'auto',padding:'28px 32px',background:P_BG}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:GRAFITE,marginBottom:4}}><i className="ti ti-chart-bar" style={{color:P,marginRight:10}}/>Relatório Operacional</div>
    <p style={{fontSize:12,color:'#B08090',marginBottom:20}}>Suba o relatório PDF — a IA lê e atualiza todos os clientes automaticamente</p>
    {msg&&<div style={{background:'#DCFCE7',color:'#15803D',padding:'10px 16px',borderRadius:10,marginBottom:14,fontSize:13,fontWeight:700}}>✓ {msg}</div>}
    <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,padding:'20px',marginBottom:16}}>
      <div style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:'#C06090',marginBottom:4}}>DATA DO RELATÓRIO</div><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...si,width:'auto'}}/></div>
      <label style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'24px',border:`1px dashed ${P_BORDER}`,borderRadius:12,cursor:'pointer',marginBottom:12,background:file?'#DCFCE7':P_BG}}>
        <i className="ti ti-upload" style={{fontSize:24,color:file?'#15803D':P,marginBottom:8}}/>
        <span style={{fontSize:12,color:file?'#15803D':P,fontWeight:600}}>{file?file.name:'Clique para selecionar o PDF do relatório'}</span>
        <input type="file" accept=".pdf" onChange={e=>setFile(e.target.files[0])} style={{display:'none'}}/>
      </label>
      {error&&<div style={{color:'#DC2626',fontSize:12,marginBottom:8}}>{error}</div>}
      <button onClick={analyze} disabled={loading||!file} style={{width:'100%',background:loading||!file?'#F3F4F6':P,color:loading||!file?'#9CA3AF':'white',padding:'11px',borderRadius:12,fontSize:13,fontWeight:700,border:'none',cursor:loading||!file?'not-allowed':'pointer'}}>
        {loading?'Analisando com IA...':'✦ Analisar relatório com IA'}
      </button>
    </div>
    {preview&&preview.length>0&&<div style={{background:'white',border:`1px solid ${LAVANDA}30`,borderRadius:18,overflow:'hidden',marginBottom:16}}>
      <div style={{padding:'12px 20px',borderBottom:`1px solid ${P_BORDER}`,display:'flex',justifyContent:'space-between'}}>
        <span style={{fontSize:13,fontWeight:700,color:P}}>✦ IA identificou {preview.length} clientes — confirme</span>
      </div>
      {preview.map((item,i)=>{const c=active.find(a=>a.name.toLowerCase().includes(item.nome.toLowerCase())||item.nome.toLowerCase().includes(a.name.toLowerCase()));return<div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 20px',borderBottom:'1px solid #FCE4EC'}}>
        <div style={{flex:1}}><span style={{fontSize:12,fontWeight:600}}>{item.nome}</span>{c&&<span style={{fontSize:10,color:'#15803D',marginLeft:6,fontWeight:600}}>→ {c.name}</span>}{!c&&<span style={{fontSize:10,color:'#DC2626',marginLeft:6}}>(não encontrado)</span>}</div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>{item.roas!=null&&<span style={{fontSize:11,color:'#B08090'}}>ROAS {item.roas}x</span>}<BrunoBdg status={item.status}/></div>
      </div>;})}
      <div style={{padding:'12px 20px',display:'flex',gap:10}}>
        <button onClick={apply} style={{flex:1,background:'#15803D',color:'white',padding:'9px',borderRadius:10,fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>✓ Confirmar e atualizar</button>
        <button onClick={()=>setPreview(null)} style={{padding:'9px 16px',borderRadius:10,fontSize:12,border:`1px solid ${P_BORDER}`,background:'transparent',color:'#B08090',cursor:'pointer'}}>Cancelar</button>
      </div>
    </div>}
    <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,overflow:'hidden'}}>
      <div style={{padding:'11px 18px',borderBottom:`1px solid ${P_BORDER}`,background:P_BG}}><span style={{fontSize:12,fontWeight:700,color:GRAFITE}}>Atualização manual</span></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))'}}>
        {active.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',borderBottom:`1px solid #FCE4EC`}}>
          <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:GRAFITE}}>{c.name}</div><div style={{fontSize:10,color:'#B08090'}}>{c.gestor}{c.brunoRoas!=null?` · ROAS ${c.brunoRoas}x`:''}</div></div>
          <div style={{display:'flex',flexDirection:'column',gap:4,minWidth:110}}>
            <select value={c.brunoStatus} onChange={e=>onUpdate(c.id,{brunoStatus:e.target.value})} style={{...si,padding:'4px 6px',cursor:'pointer'}}>
              <option value="critico">Crítico</option><option value="atencao">Atenção</option><option value="saudavel">Saudável</option><option value="sem_dados">Sem dados</option>
            </select>
            <input type="number" placeholder="ROAS" step="0.01" value={c.brunoRoas||''} onChange={e=>onUpdate(c.id,{brunoRoas:e.target.value?parseFloat(e.target.value):null})} style={{...si,padding:'4px 6px'}}/>
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ─── NOVO CLIENTE ─────────────────────────────────────────────────────────────
function NovoClienteView({clients,onAddClient,onUpdateClient}){
  const[file,setFile]=useState(null);
  const[loading,setLoading]=useState(false);
  const[form,setForm]=useState(null);
  const[existing,setExisting]=useState(null);
  const[mode,setMode]=useState('novo');
  const[error,setError]=useState('');
  const[msg,setMsg]=useState('');
  const GESTORES=['Samuel','Felício','Gabriel','—'];
  const si={border:`1px solid ${P_BORDER}`,borderRadius:8,padding:'6px 10px',fontSize:13,background:'white',color:GRAFITE,width:'100%'};
  const lbl={fontSize:10,fontWeight:700,color:'#C06090',marginBottom:3,textTransform:'uppercase',letterSpacing:0.5};

  async function analyze(){
    if(!file){setError('Selecione o PDF do contrato');return;}
    setLoading(true);setError('');setForm(null);setExisting(null);
    try{
      const b64=await fileToB64(file);
      const text=await askClaude(b64,'application/pdf','Analise este contrato. Extraia dados do CONTRATANTE (cliente, não a Jurassic).\nRetorne APENAS JSON:\n{"nome":"empresa","responsavel":"nome","tel":"telefone com DDI","email":"email","valorMensal":"R$ X.XXX","dataInicio":"YYYY-MM-DD","dataFim":"YYYY-MM-DD","tipo":"tipo de negócio","obs":"observação"}\nCampos não encontrados: null.');
      const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      const f={...parsed,gestor:'Samuel',eventoDate:null,davi:false};
      setForm(f);
      const match=clients.find(c=>c.name.toLowerCase().includes((parsed.nome||'').toLowerCase())||(parsed.nome||'').toLowerCase().includes(c.name.toLowerCase()));
      if(match){setExisting(match);setMode(match.status==='ativo'?'renovacao':'novo');}else{setMode('novo');}
    }catch(e){setError('Erro ao ler o contrato. Tente novamente.');}
    setLoading(false);
  }

  function confirmNovo(){
    if(!form?.nome){setError('Nome é obrigatório');return;}
    const newId=Math.max(...clients.map(c=>c.id))+1;
    onAddClient({id:newId,name:form.nome,gestor:form.gestor||'—',contato:form.responsavel||'—',tel:form.tel||'—',tipo:form.tipo||'—',eventoDate:form.eventoDate||null,davi:false,status:'ativo',brunoStatus:'sem_dados',brunoRoas:null,brunoGasto:0,contratoVenc:form.dataFim||null,contratoVal:form.valorMensal||'—',reuniaoStatus:'agendar',reuniaoData:null,alerta:null,obs:form.obs||'',ultimoContato:null});
    setMsg(`${form.nome} adicionado!`);setForm(null);setFile(null);setTimeout(()=>setMsg(''),5000);
  }

  function confirmRenovacao(){
    if(!existing||!form)return;
    onUpdateClient(existing.id,{contratoVenc:form.dataFim||existing.contratoVenc,contratoVal:form.valorMensal||existing.contratoVal,obs:existing.obs?`${existing.obs} | Renovado ${todayStr()}`:''});
    setMsg(`Contrato de ${existing.name} renovado!`);setForm(null);setFile(null);setExisting(null);setTimeout(()=>setMsg(''),5000);
  }

  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));

  return<div style={{flex:1,overflowY:'auto',padding:'28px 32px',background:P_BG}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:GRAFITE,marginBottom:4}}><i className="ti ti-user-plus" style={{color:P,marginRight:10}}/>Novo cliente</div>
    <p style={{fontSize:12,color:'#B08090',marginBottom:20}}>Suba o PDF do contrato — a IA detecta se é novo ou renovação</p>
    {msg&&<div style={{background:'#DCFCE7',color:'#15803D',padding:'10px 16px',borderRadius:10,marginBottom:14,fontSize:13,fontWeight:700}}>✓ {msg}</div>}
    <div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,padding:'20px',marginBottom:16}}>
      <label style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'24px',border:`1px dashed ${P_BORDER}`,borderRadius:12,cursor:'pointer',marginBottom:12,background:file?'#DCFCE7':P_BG}}>
        <i className="ti ti-file-upload" style={{fontSize:24,color:file?'#15803D':P,marginBottom:8}}/>
        <span style={{fontSize:12,color:file?'#15803D':P,fontWeight:600}}>{file?file.name:'Clique para selecionar o contrato PDF'}</span>
        <input type="file" accept=".pdf" onChange={e=>setFile(e.target.files[0])} style={{display:'none'}}/>
      </label>
      {error&&<div style={{color:'#DC2626',fontSize:12,marginBottom:8}}>{error}</div>}
      <button onClick={analyze} disabled={loading||!file} style={{width:'100%',background:loading||!file?'#F3F4F6':P,color:loading||!file?'#9CA3AF':'white',padding:'11px',borderRadius:12,fontSize:13,fontWeight:700,border:'none',cursor:loading||!file?'not-allowed':'pointer'}}>
        {loading?'Lendo contrato...':'✦ Extrair dados com IA'}
      </button>
    </div>
    {existing&&<div style={{background:'#F3E8FF',border:`1px solid ${LAVANDA}40`,borderRadius:16,padding:'16px 20px',marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:700,color:'#7E22CE',marginBottom:8}}>🔄 Renovação detectada!</div>
      <div style={{fontSize:12,color:'#6D28D9',marginBottom:12}}>O cliente <strong>{existing.name}</strong> já está na base.</div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={()=>setMode('renovacao')} style={{flex:1,background:mode==='renovacao'?LAVANDA:'white',color:mode==='renovacao'?'white':LAVANDA,padding:'8px',borderRadius:8,fontSize:12,fontWeight:700,border:`1px solid ${LAVANDA}`,cursor:'pointer'}}>Renovar contrato</button>
        <button onClick={()=>setMode('novo')} style={{flex:1,background:mode==='novo'?LAVANDA:'white',color:mode==='novo'?'white':LAVANDA,padding:'8px',borderRadius:8,fontSize:12,fontWeight:700,border:`1px solid ${LAVANDA}`,cursor:'pointer'}}>Criar como novo</button>
      </div>
    </div>}
    {form&&<div style={{background:'white',border:`1px solid ${P_BORDER}`,borderRadius:18,padding:'20px'}}>
      <div style={{fontSize:13,fontWeight:700,color:P,marginBottom:16}}>✦ Dados extraídos — revise e confirme</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {[['Nome do cliente','nome'],['Responsável','responsavel'],['Telefone','tel'],['E-mail','email'],['Tipo / Negócio','tipo'],['Valor/mês','valorMensal']].map(([label,key])=><div key={key}><div style={lbl}>{label}</div><input value={form[key]||''} onChange={e=>upd(key,e.target.value)} style={si}/></div>)}
        <div><div style={lbl}>Início</div><input type="date" value={form.dataInicio||''} onChange={e=>upd('dataInicio',e.target.value)} style={si}/></div>
        <div><div style={lbl}>Vencimento</div><input type="date" value={form.dataFim||''} onChange={e=>upd('dataFim',e.target.value||null)} style={si}/></div>
        {mode==='novo'&&<><div><div style={lbl}>Gestor</div><select value={form.gestor||'Samuel'} onChange={e=>upd('gestor',e.target.value)} style={{...si,cursor:'pointer'}}>{GESTORES.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
        <div><div style={lbl}>Data do evento</div><input type="date" value={form.eventoDate||''} onChange={e=>upd('eventoDate',e.target.value||null)} style={si}/></div></>}
      </div>
      {mode==='novo'&&<div style={{marginTop:12}}><div style={lbl}>Observações</div><textarea value={form.obs||''} onChange={e=>upd('obs',e.target.value)} rows={2} style={{...si,resize:'vertical'}}/></div>}
      <div style={{display:'flex',gap:10,marginTop:14}}>
        <button onClick={mode==='renovacao'?confirmRenovacao:confirmNovo}
          style={{flex:1,background:mode==='renovacao'?LAVANDA:P,color:'white',padding:'10px',borderRadius:12,fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>
          {mode==='renovacao'?'🔄 Confirmar renovação':'✓ Adicionar novo cliente'}
        </button>
        <button onClick={()=>{setForm(null);setExisting(null);}} style={{padding:'10px 16px',borderRadius:12,fontSize:12,border:`1px solid ${P_BORDER}`,background:'transparent',color:'#B08090',cursor:'pointer'}}>Cancelar</button>
      </div>
    </div>}
  </div>;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[view,setView]=useState('home');
  const[selId,setSelId]=useState(null);
  const today=useMemo(()=>today0(),[]);

  useEffect(()=>{
    try{const r=localStorage.getItem(KEY);if(r)setData(JSON.parse(r));else throw new Error();}
    catch{const d={clients:CLIENTS_DEFAULT,brunoDate:null,hojeData:todayStr(),hojeIds:[]};setData(d);try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}
    setLoading(false);
  },[]);

  useEffect(()=>{if(!data||loading)return;try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}},[data,loading]);
  useEffect(()=>{if(!data)return;const td=todayStr();if(data.hojeData!==td)setData(p=>({...p,hojeData:td,hojeIds:[]}));},[data?.hojeData]);

  const updClient=useCallback((id,u)=>setData(p=>({...p,clients:p.clients.map(c=>c.id===id?{...c,...u}:c)})),[]);
  const saveClient=useCallback((id,f)=>{setData(p=>({...p,clients:p.clients.map(c=>c.id===id?{...f}:c)}));setSelId(null);},[]);
  const addClient=useCallback((nc)=>setData(p=>({...p,clients:[...p.clients,nc]})),[]);
  const toggleHoje=useCallback((id)=>setData(p=>({...p,hojeIds:p.hojeIds.includes(id)?p.hojeIds.filter(x=>x!==id):[...p.hojeIds,id]})),[]);

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12,background:P_BG}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:800,color:'#5C1A3A'}}>Lyra<span style={{color:P}}>✦</span></div>
    <div style={{color:P,fontSize:13,fontWeight:600}}>Carregando...</div>
  </div>;

  const sel=data.clients.find(c=>c.id===selId);
  const nV=data.clients.filter(c=>c.status==='ativo'&&!c.davi&&c.contratoVenc&&daysTo(c.contratoVenc,today)<=30).length;

  const nav=[
    {id:'home',icon:'ti-home',label:'Início'},
    {id:'agendamentos',icon:'ti-calendar-month',label:'Agendamentos'},
    {id:'renovacoes',icon:'ti-file-text',label:'Renovações',badge:nV},
    {id:'clientes',icon:'ti-users',label:'Clientes'},
    {id:'relatorio',icon:'ti-chart-bar',label:'Relatório'},
    {id:'novoCliente',icon:'ti-user-plus',label:'Novo cliente'},
  ];

  return<>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}`}</style>
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar — branca */}
      <div style={{width:220,background:'white',borderRight:`1px solid ${P_BORDER}`,display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'24px 16px 20px',borderBottom:`1px solid ${P_BORDER}`,display:'flex',justifyContent:'center'}}>
          <LyraLogo/>
        </div>
        <nav style={{padding:'12px 10px',flex:1}}>
          {nav.map(n=><button key={n.id} onClick={()=>setView(n.id)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,fontSize:13,fontWeight:600,
              background:view===n.id?P_LIGHT:'transparent',
              color:view===n.id?P:GRAFITE,
              border:'none',marginBottom:2,cursor:'pointer',textAlign:'left',transition:'all 0.15s'}}>
            <i className={`ti ${n.icon}`} style={{fontSize:16,color:view===n.id?P:'#B08090'}} aria-hidden="true"/>
            <span style={{flex:1}}>{n.label}</span>
            {n.badge>0&&<span style={{background:P_LIGHT,color:P_DARK,fontSize:10,padding:'1px 6px',borderRadius:20,fontWeight:700}}>{n.badge}</span>}
          </button>)}
        </nav>
        <div style={{padding:'12px 18px',borderTop:`1px solid ${P_BORDER}`,fontSize:10,color:'#C0A0B0',textAlign:'center'}}>
          {new Date().toLocaleDateString('pt-BR')} · LYRA v2
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,display:'flex',minWidth:0,overflow:'hidden'}}>
        {view==='home'&&<LyraHome clients={data.clients} onSelect={setSelId} onUpd={updClient} hoje={data.hojeIds} onToggleHoje={toggleHoje} today={today}/>}
        {view==='agendamentos'&&<AgendamentosView clients={data.clients} onSelect={setSelId} today={today}/>}
        {view==='renovacoes'&&<RenovacoesView clients={data.clients} onSelect={setSelId} today={today}/>}
        {view==='clientes'&&<ClientesView clients={data.clients} onSelect={setSelId} today={today}/>}
        {view==='relatorio'&&<RelatorioView clients={data.clients} onUpdate={updClient} brunoDate={data.brunoDate} onSetDate={d=>setData(p=>({...p,brunoDate:d}))}/>}
        {view==='novoCliente'&&<NovoClienteView clients={data.clients} onAddClient={addClient} onUpdateClient={updClient}/>}
        {sel&&<DetailPanel c={sel} onClose={()=>setSelId(null)} onSave={saveClient} today={today}/>}
      </div>
    </div>
  </>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
